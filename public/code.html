<!DOCTYPE html>

<html class="dark" lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="styles.css">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f2cc0d",
                        "background-light": "#f8f8f5",
                        "background-dark": "#121212", // Adjusted for a deeper B2B feel
                        "surface-dark": "#1e1e1e",
                    },
                    fontFamily: {
                        "display": ["Work Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Work Sans', sans-serif;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .ios-bottom-sheet {
            box-shadow: 0 -10px 25px -5px rgba(0, 0, 0, 0.3);
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-black/60 font-display min-h-screen flex flex-col justify-end">
    <!-- Modal Backdrop Emulation -->
    <div class="fixed inset-0 z-0 bg-black/60"></div>
    <!-- Bottom Sheet Modal -->
    <div
        class="relative z-10 w-full max-w-md mx-auto bg-background-light dark:bg-background-dark rounded-t-xl overflow-hidden flex flex-col max-h-[92vh] ios-bottom-sheet">
        <!-- BottomSheetHandle -->
        <div class="flex flex-col items-center pt-3 pb-1 bg-background-light dark:bg-background-dark">
            <div class="h-1.5 w-10 rounded-full bg-gray-300 dark:bg-gray-700"></div>
        </div>
        <!-- TopAppBar -->
        <div
            class="flex items-center bg-background-light dark:bg-background-dark px-4 py-2 border-b border-gray-100 dark:border-gray-800">
            <h2 class="text-gray-900 dark:text-white text-xl font-bold leading-tight tracking-tight flex-1">Tu Pedido
            </h2>
            <button
                class="flex items-center justify-center p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
                <span class="material-symbols-outlined text-gray-900 dark:text-white">close</span>
            </button>
        </div>
        <!-- Scrollable Content -->
        <div class="flex-1 overflow-y-auto py-2">
            <!-- ListItem 1 -->
            <div
                class="flex items-center gap-4 bg-background-light dark:bg-background-dark px-4 min-h-[88px] py-3 border-b border-gray-50 dark:border-gray-800/50">
                <div class="flex items-center gap-4 flex-1">
                    <div class="bg-center bg-no-repeat aspect-square bg-cover rounded-lg size-16 shrink-0 shadow-sm"
                        data-alt="Pack of 50 burger buns"
                        style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuDFXQ5ed5k4lqZZ5kmD-XA6QurozmxfW2ppUaxtLnTxqLE1sd0ES5olAvnXXBxHIQ6kunbWJrifqgx0Wqm1Y4V3lsFdymju6hnG-hlDCxiEHEMymwYmXmPY86-PiZW4mvDi1b4DlOswP3mZ_aBQ3Q079rFwd69r-oT21qfNroNYra8Ml7qV0qJxvUYBJD5TnkpUDI1NMgIDVaaW2O485_L1M7QVUSWNEZiOidK1HSDGjcEe0kSUn5-VMV0JMHKsJzrZDJGzD7Eqwq9B");'>
                    </div>
                    <div class="flex flex-col justify-center">
                        <p class="text-gray-900 dark:text-white text-base font-semibold leading-tight mb-1">Pack 50x Pan
                            de Hamburguesa</p>
                        <p class="text-gray-500 dark:text-gray-400 text-sm font-medium">$45.00 <span
                                class="text-xs opacity-60 ml-1">/ unit</span></p>
                    </div>
                </div>
                <div class="shrink-0">
                    <div
                        class="flex items-center gap-3 text-gray-900 dark:text-white bg-gray-100 dark:bg-gray-800 p-1 rounded-full">
                        <button
                            class="text-lg font-bold flex h-8 w-8 items-center justify-center rounded-full bg-white dark:bg-gray-700 shadow-sm active:scale-95 transition-transform">-</button>
                        <input class="text-base font-bold w-6 p-0 text-center bg-transparent border-none focus:ring-0"
                            type="number" value="2" />
                        <button
                            class="text-lg font-bold flex h-8 w-8 items-center justify-center rounded-full bg-primary text-black shadow-sm active:scale-95 transition-transform">+</button>
                    </div>
                </div>
            </div>
            <!-- ListItem 2 -->
            <div
                class="flex items-center gap-4 bg-background-light dark:bg-background-dark px-4 min-h-[88px] py-3 border-b border-gray-50 dark:border-gray-800/50">
                <div class="flex items-center gap-4 flex-1">
                    <div class="bg-center bg-no-repeat aspect-square bg-cover rounded-lg size-16 shrink-0 shadow-sm"
                        data-alt="Bulk box of hot dog sausages"
                        style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuCRNZBwVm2UmEfA4FPcTkE9SDLPmVjtrD70C0DDUOw-7jEd4d7H38SdOhqDZmiaBhMfBdIiJyLqK8z0sA9DjktAcd1WaodeP8b7Ms25D-3fW2IuIjpxJy3Ux0lDtw_b-qo75HDxc3YcFtwEzAcsiYf6co1A4kcG5Tdh8ynAbAC0YL2FweI2MB1TZcobP7mdft52i_seIGbusYVcR7jIefGNjmaz7aV35vK3LP-B-NZObk-O-gHPzFhcO403xTKjUZDKzIsSyd8xP-U4");'>
                    </div>
                    <div class="flex flex-col justify-center">
                        <p class="text-gray-900 dark:text-white text-base font-semibold leading-tight mb-1">Caja 20kg
                            Salchichas Hot Dog</p>
                        <p class="text-gray-500 dark:text-gray-400 text-sm font-medium">$120.00 <span
                                class="text-xs opacity-60 ml-1">/ box</span></p>
                    </div>
                </div>
                <div class="shrink-0">
                    <div
                        class="flex items-center gap-3 text-gray-900 dark:text-white bg-gray-100 dark:bg-gray-800 p-1 rounded-full">
                        <button
                            class="text-lg font-bold flex h-8 w-8 items-center justify-center rounded-full bg-white dark:bg-gray-700 shadow-sm active:scale-95 transition-transform">-</button>
                        <input class="text-base font-bold w-6 p-0 text-center bg-transparent border-none focus:ring-0"
                            type="number" value="1" />
                        <button
                            class="text-lg font-bold flex h-8 w-8 items-center justify-center rounded-full bg-primary text-black shadow-sm active:scale-95 transition-transform">+</button>
                    </div>
                </div>
            </div>
            <!-- ListItem 3 (Extra for wholesale feel) -->
            <div
                class="flex items-center gap-4 bg-background-light dark:bg-background-dark px-4 min-h-[88px] py-3 border-b border-gray-50 dark:border-gray-800/50">
                <div class="flex items-center gap-4 flex-1">
                    <div class="bg-center bg-no-repeat aspect-square bg-cover rounded-lg size-16 shrink-0 shadow-sm"
                        data-alt="Gallon of classic yellow mustard"
                        style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuC8MAlVGax-SOoQaqLtFVrL9xAA-V6oiVhEAYSLUVXjwKp13vGh9iqptW2nEvsYPZ7uNVK1YZs1vwGu4oSSnyStwO_w5p0e6-o_slKphzIDiT3LNBM498CMZ68DBxxHQ5hHApUEzYzL4gx7zL-RlGMH0s7Ie8ykQ_8SaQt0VcmqEappBIjzipULEYpKlxU1RSscnEUo6CNh4VaEKXgvpzlCi3vg6D3Mnoev2cItKjh3PK3DDxyl57TdGBa4hg6QXnYlrAo5H3fPvTp2");'>
                    </div>
                    <div class="flex flex-col justify-center">
                        <p class="text-gray-900 dark:text-white text-base font-semibold leading-tight mb-1">Galón
                            Mostaza Clásica</p>
                        <p class="text-gray-500 dark:text-gray-400 text-sm font-medium">$15.50 <span
                                class="text-xs opacity-60 ml-1">/ unit</span></p>
                    </div>
                </div>
                <div class="shrink-0">
                    <div
                        class="flex items-center gap-3 text-gray-900 dark:text-white bg-gray-100 dark:bg-gray-800 p-1 rounded-full">
                        <button
                            class="text-lg font-bold flex h-8 w-8 items-center justify-center rounded-full bg-white dark:bg-gray-700 shadow-sm active:scale-95 transition-transform">-</button>
                        <input class="text-base font-bold w-6 p-0 text-center bg-transparent border-none focus:ring-0"
                            type="number" value="3" />
                        <button
                            class="text-lg font-bold flex h-8 w-8 items-center justify-center rounded-full bg-primary text-black shadow-sm active:scale-95 transition-transform">+</button>
                    </div>
                </div>
            </div>
        </div>
        <!-- Sticky Footer Summary Section -->
        <div
            class="bg-background-light dark:bg-background-dark border-t border-gray-200 dark:border-gray-800 p-6 pb-10">
            <!-- DescriptionList -->
            <div class="space-y-3 mb-6">
                <div class="flex justify-between items-center">
                    <p class="text-gray-500 dark:text-gray-400 text-base font-medium">Subtotal</p>
                    <p class="text-gray-900 dark:text-white text-base font-semibold">$256.50</p>
                </div>
                <div class="flex justify-between items-center">
                    <p class="text-gray-500 dark:text-gray-400 text-base font-medium">IVA (21%)</p>
                    <p class="text-gray-900 dark:text-white text-base font-semibold">$53.86</p>
                </div>
                <div class="pt-3 border-t border-gray-100 dark:border-gray-800 flex justify-between items-center">
                    <p class="text-gray-900 dark:text-white text-lg font-bold">Total</p>
                    <p class="text-primary text-2xl font-bold">$310.36</p>
                </div>
            </div>
            <!-- Main CTA Button -->
            <button
                class="w-full bg-primary hover:bg-[#e1bd0c] text-black font-bold py-4 rounded-xl text-lg flex items-center justify-center gap-2 transition-colors active:scale-[0.98]">
                <span>Confirmar Pedido</span>
                <span class="material-symbols-outlined font-bold">arrow_forward</span>
            </button>
        </div>
    </div>
</body>

</html>
