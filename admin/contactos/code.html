</div>

<p class="text-on-surface-variant font-medium text-sm tracking-tight uppercase">Founder &amp; Designer at Amber Obsidian</p>

<div class="flex flex-col gap-4">

<span class="font-bold tracking-tight text-sm uppercase">Instagram</span>
</div>
<span class="material-symbols-outlined opacity-50 group-hover:opacity-100 transition-opacity" data-icon="north_east">north_east</span>
</a>
<!-- WhatsApp -->
<a class="group relative flex items-center justify-between w-full p-5 bg-surface-container-low text-on-surface border-2 border-on-surface rounded-xl transition-all duration-200 active:scale-95 shadow-sm" href="#">

<span class="material-symbols-outlined text-2xl" data-icon="chat">chat</span>
<span class="font-bold tracking-tight text-sm uppercase">WhatsApp</span>
</div>
<span class="material-symbols-outlined opacity-50 group-hover:opacity-100 transition-opacity" data-icon="north_east">north_east</span>
</a>

</div>
<span class="material-symbols-outlined opacity-50 group-hover:opacity-100 transition-opacity" data-icon="north_east">north_east</span>
</a>
